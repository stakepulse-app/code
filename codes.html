<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StakePulse — Codes & Live Drops</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        sp: {
          bg:     '#080d12',
          card:   '#0d1520',
          card2:  '#111d2a',
          border: '#1a2d3d',
          green:  '#00ff88',
          blue:   '#00d4ff',
          amber:  '#fbbf24',
          red:    '#f87171',
          purple: '#a855f7',
        }
      }
    }
  }
}
</script>
<style>
  body { background: #080d12; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,.04), transparent 60%); pointer-events:none; }

  .card-active { border-color: rgba(0,212,255,.2); }
  .card-active:hover { border-color: rgba(0,212,255,.5); box-shadow: 0 0 24px rgba(0,212,255,.08); transform: translateY(-2px); }
  .card-expired { border-color: rgba(255,255,255,.06); opacity: .45; filter: grayscale(.4); }
  .card-expired:hover { opacity: .6; }
  .card-transition { transition: all .2s ease; }

  .code-box { font-family: 'Courier New', monospace; letter-spacing: .08em; }

  .btn-copy { transition: all .15s; }
  .btn-copy:active { transform: scale(.96); }
  .btn-copy.copied { background: rgba(0,255,136,.15) !important; border-color: rgba(0,255,136,.5) !important; color: #00ff88 !important; }

  .filter-btn { transition: all .15s; }
  .filter-btn.active { background: rgba(0,212,255,.15); border-color: rgba(0,212,255,.5); color: #00d4ff; }

  .badge-active { background: rgba(0,255,136,.12); color: #00ff88; border: 1px solid rgba(0,255,136,.3); }
  .badge-expired { background: rgba(255,255,255,.06); color: #64748b; border: 1px solid rgba(255,255,255,.1); }

  .type-badge { font-size: 10px; font-weight: 700; letter-spacing: .5px; padding: 2px 7px; border-radius: 4px; }
  .type-drop   { background: rgba(168,85,247,.15); color: #a855f7; border: 1px solid rgba(168,85,247,.3); }
  .type-promo  { background: rgba(251,191,36,.12); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
  .type-bonus  { background: rgba(0,212,255,.12); color: #00d4ff; border: 1px solid rgba(0,212,255,.3); }
  .type-code   { background: rgba(0,255,136,.1);  color: #00ff88;  border: 1px solid rgba(0,255,136,.3); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .card-anim { animation: fadeIn .25s ease forwards; }

  .lang-toggle { position:fixed; bottom:20px; left:20px; display:flex; gap:4px; z-index:200; background:#0d1520; border:1px solid #1a2d3d; border-radius:8px; padding:4px; }
  .lang-btn { background:transparent; border:none; color:#6a8a9a; font-size:12px; font-weight:700; padding:4px 10px; border-radius:5px; cursor:pointer; transition:all .2s; }
  .lang-btn.active { background:#111d2a; color:#c8d8e8; }
</style>
</head>
<body class="min-h-screen text-slate-200">

<!-- Lang toggle -->
<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('fr')">🇫🇷 FR</button>
  <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
</div>

<!-- Header -->
<div class="max-w-6xl mx-auto px-4 pt-10 pb-6">
  <div class="flex items-center gap-3 mb-2">
    <a href="https://stakepulse-app.github.io/portal" class="text-slate-400 hover:text-slate-200 text-sm transition-colors" data-fr="← Portail" data-en="← Portal">← Portail</a>
  </div>
  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-2">
    <div>
      <h1 class="text-3xl font-black tracking-tight" data-fr="🎁 Codes & Live Drops" data-en="🎁 Codes & Live Drops">🎁 Codes & Live Drops</h1>
      <p class="text-slate-400 text-sm mt-1" data-fr="Tous les codes promotionnels Stake actifs — copiez et réclamez en un clic." data-en="All active Stake promo codes — copy and claim in one click.">Tous les codes promotionnels Stake actifs — copiez et réclamez en un clic.</p>
    </div>
    <div class="flex items-center gap-2 text-sm text-slate-400">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
      <span id="active-count">—</span> <span data-fr="actifs" data-en="active">actifs</span>
    </div>
  </div>

  <!-- Filters -->
  <div class="flex flex-wrap gap-2 mt-5" id="filters">
    <button class="filter-btn active text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-300" onclick="setFilter('all')" data-filter="all" data-fr="Tous" data-en="All">Tous</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('active')" data-filter="active" data-fr="✅ Actifs" data-en="✅ Active">✅ Actifs</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('expired')" data-filter="expired" data-fr="⏸ Expirés" data-en="⏸ Expired">⏸ Expirés</button>
    <div class="w-px bg-sp-border mx-1"></div>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('drop')" data-filter="drop" data-fr="💧 Drops" data-en="💧 Drops">💧 Drops</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('promo')" data-filter="promo" data-fr="🎯 Promos" data-en="🎯 Promos">🎯 Promos</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('bonus')" data-filter="bonus" data-fr="🎰 Bonus" data-en="🎰 Bonus">🎰 Bonus</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('code')" data-filter="code" data-fr="🔑 Codes" data-en="🔑 Codes">🔑 Codes</button>
  </div>
</div>

<!-- Grid -->
<div class="max-w-6xl mx-auto px-4 pb-16">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="cards-grid"></div>
  <div id="empty-state" class="hidden text-center py-16 text-slate-500">
    <div class="text-4xl mb-3 opacity-40">🎁</div>
    <p data-fr="Aucun code pour ce filtre" data-en="No codes for this filter">Aucun code pour ce filtre</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  DONNÉES — Modifiez ce tableau pour ajouter/modifier des codes
// ═══════════════════════════════════════════════════════════════
const CODES = [
  {
    id: 1,
    name: 'Stream Drop 15K',
    description: { fr: 'Drop lors du stream officiel Stake', en: 'Drop during official Stake stream' },
    value: { fr: '$5.00', en: '$5.00' },
    wager: { fr: 'Wager requis : $2 500', en: 'Wager required: $2,500' },
    code: 'STREAMDROP15K',
    type: 'drop',
    status: 'active',
    expires: null,
    claimUrl: 'https://stake.com/?offer=STREAMDROP15K',
  },
  {
    id: 2,
    name: 'Bonus Hebdo VIP',
    description: { fr: 'Bonus VIP de la semaine', en: 'Weekly VIP Bonus' },
    value: { fr: 'Jusqu\'à $500', en: 'Up to $500' },
    wager: { fr: 'Réservé aux VIP Silver+', en: 'VIP Silver+ only' },
    code: 'VIPWEEKLY',
    type: 'bonus',
    status: 'active',
    expires: '2026-07-03',
    claimUrl: 'https://stake.com/',
  },
  {
    id: 3,
    name: 'Code Parrainage',
    description: { fr: 'Code de parrainage StakePulse', en: 'StakePulse referral code' },
    value: { fr: '5% de rakeback', en: '5% rakeback' },
    wager: null,
    code: 'STAKEPULSE',
    type: 'code',
    status: 'active',
    expires: null,
    claimUrl: 'https://stake.com/?c=STAKEPULSE',
  },
  {
    id: 4,
    name: 'Promo Coupe du Monde',
    description: { fr: 'Bonus spécial Coupe du Monde 2026', en: 'World Cup 2026 special bonus' },
    value: { fr: '×3 points (hors FR)', en: '×3 points (excl. FR)' },
    wager: { fr: 'Paris sportifs uniquement', en: 'Sports bets only' },
    code: 'WCT2026',
    type: 'promo',
    status: 'active',
    expires: '2026-07-03',
    claimUrl: 'https://tournament-wct.github.io/tournament',
  },
  {
    id: 5,
    name: 'Drop Eddie S01',
    description: { fr: 'Premier drop de la série Stake VS Eddie', en: 'First drop of Stake VS Eddie series' },
    value: { fr: '$10.00', en: '$10.00' },
    wager: { fr: 'Wager requis : $5 000', en: 'Wager required: $5,000' },
    code: 'EDDIE01',
    type: 'drop',
    status: 'expired',
    expires: '2026-06-01',
    claimUrl: 'https://stake.com/',
  },
  {
    id: 6,
    name: 'Bonus Rechargement',
    description: { fr: 'Bonus sur votre prochain dépôt', en: 'Bonus on your next deposit' },
    value: { fr: '200% jusqu\'à $200', en: '200% up to $200' },
    wager: { fr: 'Wager ×40', en: 'Wager ×40' },
    code: 'RELOAD200',
    type: 'bonus',
    status: 'expired',
    expires: '2026-05-15',
    claimUrl: 'https://stake.com/',
  },
];

// ═══════════════════════════════════════════════════════════════
//  LOGIQUE
// ═══════════════════════════════════════════════════════════════

let currentFilter = 'all';
let currentLang = localStorage.getItem('sp_lang') || 'fr';

const TYPE_LABELS = {
  drop:  { icon: '💧', fr: 'Drop',  en: 'Drop',  cls: 'type-drop' },
  promo: { icon: '🎯', fr: 'Promo', en: 'Promo', cls: 'type-promo' },
  bonus: { icon: '🎰', fr: 'Bonus', en: 'Bonus', cls: 'type-bonus' },
  code:  { icon: '🔑', fr: 'Code',  en: 'Code',  cls: 'type-code' },
};

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function t(obj) {
  if (!obj) return '';
  if (typeof obj === 'string') return obj;
  return obj[currentLang] || obj.fr || '';
}

function formatExpiry(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr);
  return currentLang === 'fr'
    ? d.toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' })
    : d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
}

function isExpired(code) {
  return code.status === 'expired' || (code.expires && new Date(code.expires) < new Date());
}

function renderCards() {
  const grid = document.getElementById('cards-grid');
  const empty = document.getElementById('empty-state');

  let filtered = CODES.filter(c => {
    if (currentFilter === 'active')  return !isExpired(c);
    if (currentFilter === 'expired') return isExpired(c);
    if (['drop','promo','bonus','code'].includes(currentFilter)) return c.type === currentFilter;
    return true;
  });

  // Actifs en premier
  filtered.sort((a,b) => isExpired(a) - isExpired(b));

  if (!filtered.length) {
    grid.innerHTML = '';
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  const expiredLabel = currentLang === 'fr' ? 'Expiré' : 'Expired';
  const activeLabel  = currentLang === 'fr' ? 'Actif'  : 'Active';
  const copyLabel    = currentLang === 'fr' ? 'Copier le code' : 'Copy code';
  const claimLabel   = currentLang === 'fr' ? 'Réclamer →' : 'Claim →';
  const expiresLabel = currentLang === 'fr' ? 'Expire le' : 'Expires';
  const copiedLabel  = currentLang === 'fr' ? '✓ Copié !' : '✓ Copied!';

  grid.innerHTML = filtered.map((c, i) => {
    const expired = isExpired(c);
    const type = TYPE_LABELS[c.type] || TYPE_LABELS.code;
    const expiry = c.expires ? formatExpiry(c.expires) : null;

    return `
    <div class="card-transition card-anim ${expired ? 'card-expired' : 'card-active'} rounded-2xl border bg-sp-card p-5 flex flex-col gap-4"
         style="animation-delay:${i*40}ms; background:#0d1520;">

      <!-- Top row -->
      <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="type-badge ${type.cls}">${type.icon} ${t({fr:type.fr,en:type.en})}</span>
          ${expiry ? `<span class="text-xs text-slate-500">${expiresLabel} ${expiry}</span>` : ''}
        </div>
        <span class="text-xs font-bold px-2 py-1 rounded-full flex-shrink-0 ${expired ? 'badge-expired' : 'badge-active'}">
          ${expired ? '⏸ '+expiredLabel : '● '+activeLabel}
        </span>
      </div>

      <!-- Name + desc -->
      <div>
        <h3 class="font-bold text-base text-white leading-tight">${esc(c.name)}</h3>
        <p class="text-xs text-slate-400 mt-1">${esc(t(c.description))}</p>
      </div>

      <!-- Value -->
      <div class="flex items-center justify-between bg-sp-card2 rounded-xl px-4 py-3" style="background:#111d2a;">
        <div>
          <div class="text-lg font-black ${expired ? 'text-slate-500' : 'text-white'}">${esc(t(c.value))}</div>
          ${c.wager ? `<div class="text-xs text-slate-500 mt-0.5">${esc(t(c.wager))}</div>` : ''}
        </div>
      </div>

      <!-- Code box -->
      <div class="code-box text-sm font-bold tracking-widest text-center py-3 px-4 rounded-xl border ${expired ? 'border-sp-border text-slate-500 bg-transparent' : 'border-sp-border text-sp-blue bg-transparent'}"
           style="border-color: ${expired ? '#1a2d3d' : 'rgba(0,212,255,.25)'}; color: ${expired ? '#475569' : '#00d4ff'}; background: ${expired ? 'transparent' : 'rgba(0,212,255,.04)'};">
        ${esc(c.code)}
      </div>

      <!-- Actions -->
      <div class="flex gap-2 mt-auto">
        <button
          class="btn-copy flex-1 text-xs font-bold py-2.5 px-3 rounded-xl border transition-all"
          style="border-color: rgba(0,212,255,.3); color: #00d4ff; background: rgba(0,212,255,.08);"
          onclick="copyCode('${esc(c.code)}', this, '${esc(copiedLabel)}')"
          ${expired ? '' : ''}>
          📋 ${copyLabel}
        </button>
        <a href="${esc(c.claimUrl)}" target="_blank" rel="noopener"
           class="flex-shrink-0 text-xs font-bold py-2.5 px-4 rounded-xl transition-all"
           style="background: ${expired ? 'rgba(255,255,255,.05)' : 'rgba(0,255,136,.12)'}; color: ${expired ? '#475569' : '#00ff88'}; border: 1px solid ${expired ? 'rgba(255,255,255,.08)' : 'rgba(0,255,136,.3)'};">
          ${claimLabel}
        </a>
      </div>
    </div>`;
  }).join('');

  // Compteur actifs
  const activeCount = CODES.filter(c => !isExpired(c)).length;
  document.getElementById('active-count').textContent = activeCount;
}

function copyCode(code, btn, copiedLabel) {
  navigator.clipboard.writeText(code).then(() => {
    const orig = btn.innerHTML;
    btn.innerHTML = copiedLabel;
    btn.classList.add('copied');
    setTimeout(() => {
      btn.innerHTML = orig;
      btn.classList.remove('copied');
    }, 2000);
  });
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderCards();
}

// ── Lang ─────────────────────────────────────────────────────────────
function setLang(lang) {
  currentLang = lang;
  localStorage.setItem('sp_lang', lang);
  document.querySelectorAll('[data-fr]').forEach(el => {
    el.textContent = el.getAttribute('data-' + lang);
  });
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.includes(lang.toUpperCase()));
  });
  renderCards();
}

// Init
setLang(currentLang);
renderCards();
</script>
</body>
</html>
