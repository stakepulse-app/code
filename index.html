<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StakePulse — Codes & Live Drops</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: { extend: { colors: { sp: { bg:'#080d12', card:'#0d1520', card2:'#111d2a', border:'#1a2d3d' } } } }
}
</script>
<style>
body{background:#080d12;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(0,212,255,.04),transparent 60%);pointer-events:none}
.card-active{border-color:rgba(0,212,255,.2);transition:all .2s}
.card-active:hover{border-color:rgba(0,212,255,.5);box-shadow:0 0 24px rgba(0,212,255,.08);transform:translateY(-2px)}
.card-expired{border-color:rgba(255,255,255,.06);opacity:.45;filter:grayscale(.4);transition:all .2s}
.card-expired:hover{opacity:.6}
.code-box{font-family:'Courier New',monospace;letter-spacing:.08em}
.btn-copy{transition:all .15s}
.btn-copy.copied{background:rgba(0,255,136,.15)!important;border-color:rgba(0,255,136,.5)!important;color:#00ff88!important}
.filter-btn{transition:all .15s}
.filter-btn.active{background:rgba(0,212,255,.15);border-color:rgba(0,212,255,.5);color:#00d4ff}
.badge-active{background:rgba(0,255,136,.12);color:#00ff88;border:1px solid rgba(0,255,136,.3)}
.badge-expired{background:rgba(255,255,255,.06);color:#64748b;border:1px solid rgba(255,255,255,.1)}
.type-drop{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3)}
.type-promo{background:rgba(251,191,36,.12);color:#fbbf24;border:1px solid rgba(251,191,36,.3)}
.type-bonus{background:rgba(0,212,255,.12);color:#00d4ff;border:1px solid rgba(0,212,255,.3)}
.type-code{background:rgba(0,255,136,.1);color:#00ff88;border:1px solid rgba(0,255,136,.3)}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.card-anim{animation:fadeIn .25s ease forwards}
.lang-toggle{position:fixed;bottom:20px;left:20px;display:flex;gap:4px;z-index:200;background:#0d1520;border:1px solid #1a2d3d;border-radius:8px;padding:4px}
.lang-btn{background:transparent;border:none;color:#6a8a9a;font-size:12px;font-weight:700;padding:4px 10px;border-radius:5px;cursor:pointer;transition:all .2s}
.lang-btn.active{background:#111d2a;color:#c8d8e8}
</style>
</head>
<body class="min-h-screen text-slate-200">

<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('fr')">🇫🇷 FR</button>
  <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
</div>

<div class="max-w-6xl mx-auto px-4 pt-10 pb-6">
  <div class="mb-2">
    <a href="https://stakepulse-app.github.io/portal" class="text-slate-400 hover:text-slate-200 text-sm transition-colors" data-fr="← Portail" data-en="← Portal">← Portail</a>
  </div>
  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-2">
    <div>
      <h1 class="text-3xl font-black tracking-tight" data-fr="🎁 Codes & Live Drops" data-en="🎁 Codes & Live Drops">🎁 Codes & Live Drops</h1>
      <p class="text-slate-400 text-sm mt-1" data-fr="Tous les codes promotionnels Stake actifs — copiez et réclamez en un clic." data-en="All active Stake promo codes — copy and claim in one click.">Tous les codes promotionnels Stake actifs — copiez et réclamez en un clic.</p>
    </div>
    <div class="flex items-center gap-2 text-sm text-slate-400">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
      <span id="active-count">—</span> <span data-fr="actifs" data-en="active">actifs</span>
      <span class="text-slate-600 text-xs ml-2">· <span id="last-update">—</span></span>
    </div>
  </div>
  <div class="flex flex-wrap gap-2 mt-5">
    <button class="filter-btn active text-xs font-semibold px-4 py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-300" onclick="setFilter('all')" data-filter="all" data-fr="Tous" data-en="All">Tous</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-400" onclick="setFilter('active')" data-filter="active" data-fr="✅ Actifs" data-en="✅ Active">✅ Actifs</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-400" onclick="setFilter('expired')" data-filter="expired" data-fr="⏸ Expirés" data-en="⏸ Expired">⏸ Expirés</button>
    <div class="w-px bg-slate-700 mx-1"></div>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-400" onclick="setFilter('drop')" data-filter="drop" data-fr="💧 Drops" data-en="💧 Drops">💧 Drops</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-slate-700 bg-slate-800 text-slate-400" onclick="setFilter('code')" data-filter="code" data-fr="🔑 Codes" data-en="🔑 Codes">🔑 Codes</button>
  </div>
</div>

<div class="max-w-6xl mx-auto px-4 pb-16">
  <div id="loading" class="text-center py-16 text-slate-500">
    <div class="text-4xl mb-3">⏳</div>
    <p data-fr="Chargement des codes..." data-en="Loading codes...">Chargement des codes...</p>
  </div>
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 hidden" id="cards-grid"></div>
  <div id="empty-state" class="hidden text-center py-16 text-slate-500">
    <div class="text-4xl mb-3 opacity-40">🎁</div>
    <p data-fr="Aucun code pour ce filtre" data-en="No codes for this filter">Aucun code pour ce filtre</p>
  </div>
</div>

<script>
const CODES_URL = 'https://raw.githubusercontent.com/stakepulse-app/code/main/codes.json';
let CODES = [];
let currentFilter = 'all';
let currentLang = localStorage.getItem('sp_lang') || 'fr';

const TYPE_LABELS = {
  drop:  {icon:'💧', fr:'Drop',  en:'Drop',  cls:'type-drop'},
  promo: {icon:'🎯', fr:'Promo', en:'Promo', cls:'type-promo'},
  bonus: {icon:'🎰', fr:'Bonus', en:'Bonus', cls:'type-bonus'},
  code:  {icon:'🔑', fr:'Code',  en:'Code',  cls:'type-code'},
};

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function t(obj){if(!obj)return '';if(typeof obj==='string')return obj;return obj[currentLang]||obj.fr||''}
function isExpired(c){return c.status==='expired'||(c.expires&&new Date(c.expires)<new Date())}

function renderCards(){
  const grid=document.getElementById('cards-grid');
  const empty=document.getElementById('empty-state');
  let filtered=CODES.filter(c=>{
    if(currentFilter==='active') return !isExpired(c);
    if(currentFilter==='expired') return isExpired(c);
    if(['drop','promo','bonus','code'].includes(currentFilter)) return c.type===currentFilter;
    return true;
  });
  filtered.sort((a,b)=>isExpired(a)-isExpired(b));
  document.getElementById('active-count').textContent=CODES.filter(c=>!isExpired(c)).length;
  if(!filtered.length){grid.classList.add('hidden');empty.classList.remove('hidden');return;}
  empty.classList.add('hidden');grid.classList.remove('hidden');
  const expiredLabel=currentLang==='fr'?'Expiré':'Expired';
  const activeLabel=currentLang==='fr'?'Actif':'Active';
  const copyLabel=currentLang==='fr'?'Copier le code':'Copy code';
  const claimLabel=currentLang==='fr'?'Réclamer →':'Claim →';
  const copiedLabel=currentLang==='fr'?'✓ Copié!':'✓ Copied!';
  grid.innerHTML=filtered.map((c,i)=>{
    const expired=isExpired(c);
    const type=TYPE_LABELS[c.type]||TYPE_LABELS.code;
    const expiry=c.expires?new Date(c.expires).toLocaleDateString(currentLang==='fr'?'fr-FR':'en-GB'):null;
    const expiresLabel=currentLang==='fr'?'Expire le':'Expires';
    return `<div class="card-anim ${expired?'card-expired':'card-active'} rounded-2xl border p-5 flex flex-col gap-4" style="animation-delay:${i*30}ms;background:#0d1520;border-color:${expired?'rgba(255,255,255,.06)':'rgba(0,212,255,.2)'}">
      <div class="flex items-start justify-between gap-2">
        <div class="flex items-center gap-2 flex-wrap">
          <span class="text-xs font-bold px-2 py-1 rounded ${type.cls}" style="font-size:10px;letter-spacing:.5px">${type.icon} ${t({fr:type.fr,en:type.en})}</span>
          ${expiry?`<span class="text-xs text-slate-500">${expiresLabel} ${expiry}</span>`:''}
        </div>
        <span class="text-xs font-bold px-2 py-1 rounded-full flex-shrink-0 ${expired?'badge-expired':'badge-active'}">${expired?'⏸ '+expiredLabel:'● '+activeLabel}</span>
      </div>
      <div>
        <h3 class="font-bold text-base text-white leading-tight">${esc(c.name.length>40?c.name.substring(0,40)+'...':c.name)}</h3>
        ${t(c.description)&&t(c.description).length<80&&!t(c.description).includes('Code:')&&!t(c.description).includes('Value:')?`<p class="text-xs text-slate-400 mt-1">${esc(t(c.description))}</p>`:''}
      </div>
      <div class="flex items-center justify-between rounded-xl px-4 py-3" style="background:#111d2a">
        <div>
          <div class="text-lg font-black ${expired?'text-slate-500':'text-white'}">${esc(t(c.value))}</div>
          ${c.wager?`<div class="text-xs text-slate-500 mt-0.5">${esc(t(c.wager))}</div>`:''}
          ${c.claims?`<div class="text-xs text-slate-500">${c.claims} claims</div>`:''}
        </div>
      </div>
      <div class="code-box text-sm font-bold tracking-widest text-center py-3 px-4 rounded-xl border" style="border-color:${expired?'#1a2d3d':'rgba(0,212,255,.25)'};color:${expired?'#475569':'#00d4ff'};background:${expired?'transparent':'rgba(0,212,255,.04)'}">
        ${esc(c.code)}
      </div>
      <div class="flex gap-2 mt-auto">
        <button class="btn-copy flex-1 text-xs font-bold py-2.5 px-3 rounded-xl border" style="border-color:rgba(0,212,255,.3);color:#00d4ff;background:rgba(0,212,255,.08)" onclick="copyCode('${esc(c.code)}',this,'${esc(copiedLabel)}','${esc(copyLabel)}')">📋 ${copyLabel}</button>
        <a href="${esc(c.claimUrl||'https://stake.com')}" target="_blank" rel="noopener" class="flex-shrink-0 text-xs font-bold py-2.5 px-4 rounded-xl" style="background:${expired?'rgba(255,255,255,.05)':'rgba(0,255,136,.12)'};color:${expired?'#475569':'#00ff88'};border:1px solid ${expired?'rgba(255,255,255,.08)':'rgba(0,255,136,.3)'}">${claimLabel}</a>
      </div>
    </div>`;
  }).join('');
}

function copyCode(code,btn,copiedLabel,origLabel){
  navigator.clipboard.writeText(code).then(()=>{
    btn.textContent=copiedLabel;
    btn.classList.add('copied');
    setTimeout(()=>{btn.textContent='📋 '+origLabel;btn.classList.remove('copied');},2000);
  });
}

function setFilter(f){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter===f));
  renderCards();
}

function setLang(lang){
  currentLang=lang;
  localStorage.setItem('sp_lang',lang);
  document.querySelectorAll('[data-fr]').forEach(el=>el.textContent=el.getAttribute('data-'+lang));
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.textContent.includes(lang.toUpperCase())));
  renderCards();
}

async function loadCodes(){
  try{
    const r=await fetch(CODES_URL+'?t='+Date.now());
    if(!r.ok)throw new Error('HTTP '+r.status);
    const data=await r.json();
    CODES=data.codes||[];
    const lu=document.getElementById('last-update');
    if(lu)lu.textContent=(currentLang==='fr'?'màj ':'upd ')+new Date(data.updatedAt).toLocaleTimeString(currentLang==='fr'?'fr-FR':'en-GB');
  }catch(e){
    console.warn('Erreur chargement codes.json:',e);
    CODES=[];
  }
  document.getElementById('loading').classList.add('hidden');
  renderCards();
}

// Init
setLang(currentLang);
loadCodes();
setInterval(loadCodes,5000);
</script>
</body>
</html>
