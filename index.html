<!DOCTYPE html>
<html lang="fr" class="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StakePulse — Codes & Live Drops</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  darkMode: 'class',
  theme: {
    extend: {
      colors: {
        sp: {
          bg:     '#080d12',
          card:   '#0d1520',
          card2:  '#111d2a',
          border: '#1a2d3d',
          green:  '#00ff88',
          blue:   '#00d4ff',
          amber:  '#fbbf24',
          red:    '#f87171',
          purple: '#a855f7',
        }
      }
    }
  }
}
</script>
<style>
  body { background: #080d12; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  body::before { content:''; position:fixed; inset:0; background: radial-gradient(ellipse at 50% 0%, rgba(0,212,255,.04), transparent 60%); pointer-events:none; }

  .card-active { border-color: rgba(0,212,255,.2); }
  .card-active:hover { border-color: rgba(0,212,255,.5); box-shadow: 0 0 24px rgba(0,212,255,.08); transform: translateY(-2px); }
  .card-expired { border-color: rgba(255,255,255,.06); opacity: .45; filter: grayscale(.4); }
  .card-expired:hover { opacity: .6; }
  .card-transition { transition: all .2s ease; }

  .code-box { font-family: 'Courier New', monospace; letter-spacing: .08em; }

  .btn-copy { transition: all .15s; }
  .btn-copy:active { transform: scale(.96); }
  .btn-copy.copied { background: rgba(0,255,136,.15) !important; border-color: rgba(0,255,136,.5) !important; color: #00ff88 !important; }

  .filter-btn { transition: all .15s; }
  .filter-btn.active { background: rgba(0,212,255,.15); border-color: rgba(0,212,255,.5); color: #00d4ff; }

  .badge-active { background: rgba(0,255,136,.12); color: #00ff88; border: 1px solid rgba(0,255,136,.3); }
  .badge-expired { background: rgba(255,255,255,.06); color: #64748b; border: 1px solid rgba(255,255,255,.1); }

  .type-badge { font-size: 10px; font-weight: 700; letter-spacing: .5px; padding: 2px 7px; border-radius: 4px; }
  .type-drop   { background: rgba(168,85,247,.15); color: #a855f7; border: 1px solid rgba(168,85,247,.3); }
  .type-promo  { background: rgba(251,191,36,.12); color: #fbbf24; border: 1px solid rgba(251,191,36,.3); }
  .type-bonus  { background: rgba(0,212,255,.12); color: #00d4ff; border: 1px solid rgba(0,212,255,.3); }
  .type-code   { background: rgba(0,255,136,.1);  color: #00ff88;  border: 1px solid rgba(0,255,136,.3); }

  @keyframes fadeIn { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
  .card-anim { animation: fadeIn .25s ease forwards; }

  .lang-toggle { position:fixed; bottom:20px; left:20px; display:flex; gap:4px; z-index:200; background:#0d1520; border:1px solid #1a2d3d; border-radius:8px; padding:4px; }
  .lang-btn { background:transparent; border:none; color:#6a8a9a; font-size:12px; font-weight:700; padding:4px 10px; border-radius:5px; cursor:pointer; transition:all .2s; }
  .lang-btn.active { background:#111d2a; color:#c8d8e8; }
</style>
</head>
<body class="min-h-screen text-slate-200">

<!-- Lang toggle -->
<div class="lang-toggle">
  <button class="lang-btn active" onclick="setLang('fr')">🇫🇷 FR</button>
  <button class="lang-btn" onclick="setLang('en')">🇬🇧 EN</button>
</div>

<!-- Header -->
<div class="max-w-6xl mx-auto px-4 pt-10 pb-6">
  <div class="flex items-center gap-3 mb-2">
    <a href="https://stakepulse-app.github.io/portal" class="text-slate-400 hover:text-slate-200 text-sm transition-colors" data-fr="← Portail" data-en="← Portal">← Portail</a>
  </div>
  <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-4 mb-2">
    <div>
      <h1 class="text-3xl font-black tracking-tight" data-fr="🎁 Codes & Live Drops" data-en="🎁 Codes & Live Drops">🎁 Codes & Live Drops</h1>
      <p class="text-slate-400 text-sm mt-1" data-fr="Tous les codes promotionnels Stake actifs — copiez et réclamez en un clic." data-en="All active Stake promo codes — copy and claim in one click.">Tous les codes promotionnels Stake actifs — copiez et réclamez en un clic.</p>
    </div>
    <div class="flex items-center gap-2 text-sm text-slate-400">
      <span class="w-2 h-2 rounded-full bg-emerald-400 animate-pulse inline-block"></span>
      <span id="active-count">—</span> <span data-fr="actifs" data-en="active">actifs</span> <span class="text-slate-600 text-xs ml-2">· mis à jour <span id="last-update">—</span></span>
    </div>
  </div>

  <!-- Filters -->
  <div class="flex flex-wrap gap-2 mt-5" id="filters">
    <button class="filter-btn active text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-300" onclick="setFilter('all')" data-filter="all" data-fr="Tous" data-en="All">Tous</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('active')" data-filter="active" data-fr="✅ Actifs" data-en="✅ Active">✅ Actifs</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('expired')" data-filter="expired" data-fr="⏸ Expirés" data-en="⏸ Expired">⏸ Expirés</button>
    <div class="w-px bg-sp-border mx-1"></div>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('drop')" data-filter="drop" data-fr="💧 Drops" data-en="💧 Drops">💧 Drops</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('promo')" data-filter="promo" data-fr="🎯 Promos" data-en="🎯 Promos">🎯 Promos</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('bonus')" data-filter="bonus" data-fr="🎰 Bonus" data-en="🎰 Bonus">🎰 Bonus</button>
    <button class="filter-btn text-xs font-semibold px-4 py-2 rounded-lg border border-sp-border bg-sp-card2 text-slate-400" onclick="setFilter('code')" data-filter="code" data-fr="🔑 Codes" data-en="🔑 Codes">🔑 Codes</button>
  </div>
</div>

<!-- Grid -->
<div class="max-w-6xl mx-auto px-4 pb-16">
  <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4" id="cards-grid"></div>
  <div id="empty-state" class="hidden text-center py-16 text-slate-500">
    <div class="text-4xl mb-3 opacity-40">🎁</div>
    <p data-fr="Aucun code pour ce filtre" data-en="No codes for this filter">Aucun code pour ce filtre</p>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
//  DONNÉES — chargées depuis codes.json (mis à jour automatiquement)
// ═══════════════════════════════════════════════════════════════
let CODES = [];

async function loadCodes() {
  try {
    const r = await fetch('https://raw.githubusercontent.com/stakepulse-app/code/main/codes.json?t=' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    CODES = data.codes || [];
    document.getElementById('last-update').textContent =
      new Date(data.updatedAt).toLocaleTimeString(currentLang === 'fr' ? 'fr-FR' : 'en-GB');
  } catch(e) {
    console.warn('codes.json introuvable, utilisation des codes locaux', e);
    CODES = [];
  }
  renderCards();
}

// Init
setLang(currentLang);
loadCodes();
setInterval(loadCodes, 60000); // Refresh auto toutes les 60s
</script>
</body>
</html>
